# Image-to-Video inference (single image + first/last frame modes)
model_kwargs:
  model_name: Wan2.2-TI2V-5B
  timestep_shift: 5.0
  num_frame_per_block: 8
  local_attn_size: 32

use_ema: false
output_folder: /output
num_samples: 1
save_latents_only: false

data:
  data_path: /prompts
  image_or_video_shape:
  - 1
  - 128
  - 48
  - 44
  - 80

inference:
  sampling_steps: 4
  sink_size: 8
  guidance_scale: 1.0
  multi_shot_sink: true
  multi_shot_rope_offset: 8
  streaming_vae: false
  async_vae: false
  vae_type: wan
  independent_first_frame: true   # Required for I2V — inject first frame at t=0

checkpoints:
  generator_ckpt: /models/LongLive-2.0-5B/model_bf16.pt

logging:
  seed: 0
